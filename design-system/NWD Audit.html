<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NWD · Design System Audit</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; background: #07090A; overflow: hidden; }
    body { font-family: 'Inter', system-ui, sans-serif; color: #F2F4F3; -webkit-font-smoothing: antialiased; }
    *, *::before, *::after { box-sizing: border-box; }

    /* audit-only animations (avoid clashing with main app) */
    @keyframes auditPulseFast {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.18); opacity: 0.65; }
    }
    @keyframes auditPulseSlow {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.85; }
    }
    @keyframes auditBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.35; }
    }
    @keyframes auditScan {
      0% { top: -2px; }
      50% { top: 30px; }
      100% { top: -2px; }
    }
    @keyframes auditSpark {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      40% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-22px) scale(1.2); }
    }
    @keyframes auditGlitch {
      0%, 92%, 100% { transform: translate(0); filter: hue-rotate(0); }
      93% { transform: translate(2px, 0); filter: hue-rotate(45deg); }
      94% { transform: translate(-2px, 1px); filter: hue-rotate(-45deg); }
      95% { transform: translate(0); filter: hue-rotate(0); }
    }

    ::-webkit-scrollbar { width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="audit/audit-shared.jsx"></script>
  <script type="text/babel" src="audit/audit-sections-1-4.jsx"></script>
  <script type="text/babel" src="audit/audit-sections-5-8.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState } = React;

    function AuditApp() {
      // Each section becomes one DCArtboard
      const sections = [
        { id: 's1', label: '01 · Race state tokens', Comp: Section1 },
        { id: 's2', label: '02 · Type scale',        Comp: Section2 },
        { id: 's3', label: '03 · Telemetry tokens',  Comp: Section3 },
        { id: 's4', label: '04 · Motion tokens',     Comp: Section4 },
        { id: 's5', label: '05 · Elevation system',  Comp: Section5 },
        { id: 's6', label: '06 · Chrome primitives', Comp: Section6 },
        { id: 's7', label: '07 · Voice & tone',      Comp: Section7 },
        { id: 's8', label: '08 · Icon system',       Comp: Section8 },
      ];

      return (
        <DesignCanvas
          title="NWD · Design System Audit"
          subtitle="Co mamy dziś · co proponuję · co dostajemy"
        >
          <DCSection id="audit" title="Audyt — 8 sekcji systemu">
            {sections.map(s => (
              <DCArtboard key={s.id} id={s.id} label={s.label} width={1200} height={780}>
                <div style={{ background: '#07090A', height: '100%',
                  fontFamily: '"Inter", system-ui, sans-serif', color: '#F2F4F3',
                  display: 'flex', flexDirection: 'column' }}>
                  <s.Comp/>
                </div>
              </DCArtboard>
            ))}
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AuditApp/>);
  </script>
</body>
</html>
